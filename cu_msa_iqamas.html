<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MSA Iqama Times</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 18px;
      margin: 10px auto;
      border-radius: 12px;
      max-width: 320px;
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .highlight {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    #next {
      margin-top: 20px;
      font-size: 20px;
      color: #38bdf8;
    }

    #updated {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>🕌 MSA Iqama Times</h1>
  <div id="times">Loading...</div>
  <div id="next"></div>
  <div id="updated"></div>

  <script>
    const API_URL = "https://sheetdb.io/api/v1/pko9izdastsdo";

    function parseTime(timeStr) {
      const now = new Date();
      const [time, modifier] = timeStr.split(" ");
      let [hours, minutes] = time.split(":");

      hours = parseInt(hours);
      minutes = parseInt(minutes);

      if (modifier === "PM" && hours !== 12) hours += 12;
      if (modifier === "AM" && hours === 12) hours = 0;

      const date = new Date();
      date.setHours(hours, minutes, 0);
      return date;
    }

    function getNextPrayer(times) {
      const now = new Date();

      for (let t of times) {
        const prayerTime = parseTime(t.Time);
        if (prayerTime > now) return t;
      }
      return times[0]; // next day fallback
    }

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("times");
        container.innerHTML = "";

        // IMPORTANT: adjust keys if needed
        // Your sheet likely uses "Prayer" and "Time"
        const cleaned = data.map(row => ({
          Prayer: row.Prayer || row.prayer,
          Time: row.Time || row.time
        }));

        const nextPrayer = getNextPrayer(cleaned);

        cleaned.forEach(row => {
          const div = document.createElement("div");
          div.className = "card";

          if (row.Prayer === nextPrayer.Prayer) {
            div.classList.add("highlight");
          }

          div.innerHTML = `
            <span>${row.Prayer}</span>
            <span>${row.Time}</span>
          `;

          container.appendChild(div);
        });

        document.getElementById("next").innerText =
          `Next Iqama: ${nextPrayer.Prayer} at ${nextPrayer.Time}`;

        document.getElementById("updated").innerText =
          "Auto-updated from admin sheet";
      })
      .catch(err => {
        document.getElementById("times").innerText = "Error loading times.";
        console.error(err);
      });
  </script>

</body>
</html>
